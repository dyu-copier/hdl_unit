_subdirectory: .
_exclude:
  - "{% if not enable_fpga %}fpga{% endif %}"
  - "{% if not enable_formal %}formal{% endif %}"
  - ".venv"
  - ".git"
  - "uv.lock"
  - "*.orig"
  - "__pycache__"
  - "*.pyc"
  - "*.pyo"
  - "verilog"
  - "bo"
  # rtl_unit's own template CI does not belong in generated IPs — they get
  # their own workflow rendered from .github/workflows/ci.yml.jinja instead.
  - ".github/workflows/ci.yml"

#Questions
ip_name:
  type: str
  help: ip name

ip_short_desc:
  type: str
  help: short description
ip_long_desc:
  type: str
  help: long description
author:
  type: str
  help: Author
email:
  type: str
  help: Email

target_process:
  type: str
  help: "Target process node e.g. sky130, gf180, asap7"
  default: "sky130"

clock_freq_mhz:
  type: int
  help: "Target clock frequency in MHz"
  default: 100

bus_protocol:
  type: str
  help: "Bus protocol"
  default: "axi4-lite"
  choices:
    - "axi4-lite"
    - "axi4"
    - "ahb"
    - "apb"
    - "wishbone"

enable_fpga:
  type: bool
  help: "Include FPGA prototyping flow"
  default: true

enable_formal:
  type: bool
  help: "Include formal verification flow"
  default: true

fpga_part:
  type: str
  help: "FPGA part number"
  default: "xc7a35tcpg236-1"
  when: "{{ enable_fpga }}"

liberty_file:
  type: str
  help: "Path to liberty (.lib) timing library"
  default: ""

lef_file:
  type: str
  help: "Path to LEF technology file"
  default: ""
