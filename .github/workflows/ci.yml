name: hdl_unit template CI

# Runs the 20 template-scaffolding tests (formerly rtl_unit_docker/test.sh;
# the doc test is disabled — no pandoc assets in the tools image) for each
# has_axi_slave/has_axi_master combination by pulling the pre-built
# ghcr.io/dyu-copier/rtl_unit_tools image — no docker build step.
#
# The 4 combos run as PARALLEL MATRIX JOBS (one runner each) rather than
# sequentially in one container/job: each runner has its own 120-minute
# budget and its own CPU/RAM, so a slow combo (e.g. the AXI4 formal
# checkers' per-ID BMC tracking) can't starve or time out the others.
# fail-fast is off so one red combo doesn't cancel the rest mid-run.
#
# Runs on a normal ubuntu-latest runner (not job-level `container:`)
# because the tools image is a pure-Nix build with no FHS glibc
# dynamic-linker path, which breaks GitHub's Node-based actions (checkout
# etc.) when used as the job container.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN least privilege: checkout + ghcr.io image pull only.
permissions:
  contents: read
  packages: read

# Supersede in-flight runs of the same PR/branch; never cancel main builds.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - combo: slave_only
            has_slave: true
            has_master: false
          - combo: master_only
            has_slave: false
            has_master: true
          - combo: both
            has_slave: true
            has_master: true
          - combo: neither
            has_slave: false
            has_master: false

    steps:
      - name: Checkout hdl_unit (this repo)
        uses: actions/checkout@v6
        with:
          path: hdl_unit

      - name: Checkout bsv_axi
        uses: actions/checkout@v6
        with:
          repository: dyumnin/bsv_bus_protocols
          path: bsv_axi

      - name: Purge stale .bo files in bsv_axi (BSC version mismatch guard)
        run: find bsv_axi -name '*.bo' -delete 2>/dev/null || true

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull rtl_unit_tools image
        run: docker pull ghcr.io/dyu-copier/rtl_unit_tools:latest

      - name: Run 20 template-scaffolding tests [${{ matrix.combo }}]
        env:
          COMBO: ${{ matrix.combo }}
          HAS_SLAVE: ${{ matrix.has_slave }}
          HAS_MASTER: ${{ matrix.has_master }}
        run: |
          {
          IMAGE=ghcr.io/dyu-copier/rtl_unit_tools:latest
          TEMPLATE_DIR="$GITHUB_WORKSPACE/hdl_unit"
          BSV_LIB_DIR="$GITHUB_WORKSPACE/bsv_axi"
          IP_DIR="$GITHUB_WORKSPACE/myip"
          RESULTS_DIR="$GITHUB_WORKSPACE/results"

          rm -rf "$IP_DIR" "$RESULTS_DIR"
          mkdir -p "$IP_DIR" "$RESULTS_DIR"

          set +e

          docker run -i --name "ci_test_run_${COMBO}" \
            -v "$TEMPLATE_DIR:/template:ro" \
            -v "$BSV_LIB_DIR:/bsv_axi:ro" \
            -v "$RESULTS_DIR:/results" \
            -v "$IP_DIR:/tmp/myip" \
            -e "HAS_SLAVE=${HAS_SLAVE}" \
            -e "HAS_MASTER=${HAS_MASTER}" \
            "$IMAGE" bash -s << 'CONTAINER_EOF'

          set +e
          R=/results

          pass() { printf 'PASS' > "$R/$1.status"; }
          fail() { printf 'FAIL' > "$R/$1.status"; printf '%s' "$2" | tail -25 > "$R/$1.detail"; }

          # Quick environment diagnostics (appear in log for debugging)
          echo "==> DIAG: MAKEFLAGS=[${MAKEFLAGS:-unset}]"
          echo "==> DIAG: BLUESPEC_HOME=[${BLUESPEC_HOME:-unset}]"
          ls "${BLUESPEC_HOME}/lib/Verilog/FIFO1.v" > /dev/null 2>&1 \
            && echo "==> DIAG: BSC lib/Verilog OK" \
            || echo "==> DIAG: BSC lib/Verilog NOT FOUND"
          which peakrdl > /dev/null 2>&1 \
            && echo "==> DIAG: peakrdl=$(which peakrdl)" \
            || echo "==> DIAG: peakrdl NOT FOUND"

          # Strips directories that contain symlinks pointing outside the
          # tree (e.g. .venv/bin/python3 -> /usr/bin/…), which copier 9.16+
          # rejects before _exclude filtering can suppress them.
          cp -r /template/. /tmp/template_clean
          rm -rf /tmp/template_clean/.venv \
                 /tmp/template_clean/bo \
                 /tmp/template_clean/verilog \
                 /tmp/template_clean/__pycache__ \
                 /tmp/template_clean/.git

          IP_DIR=/tmp/myip

          # ---- 1. copier: generate a test project from the template ----
          out=$(copier copy --overwrite --trust --defaults \
            -d ip_name=myip \
            -d ip_short_desc="CI test IP" \
            -d ip_long_desc="Auto-generated IP for testing" \
            -d author="CI Bot" \
            -d email="ci@example.com" \
            -d target_process=sky130 \
            -d clock_freq_mhz=100 \
            -d has_axi_slave=$HAS_SLAVE \
            -d has_axi_master=$HAS_MASTER \
            -d enable_fpga=true \
            -d enable_formal=true \
            -d liberty_file="" \
            -d lef_file="" \
            /tmp/template_clean "$IP_DIR" 2>&1 </dev/null)
          [ $? -eq 0 ] && pass "1_copier" || fail "1_copier" "$out"

          # ---- 2. peakrdl+bsc: RDL → BSV (peakrdl) → Verilog (bsc myip.bsv)
          export MYIP_ROOT="$IP_DIR"
          # All AMBA libraries from unified_axi (clean, no Logger/FIFOLevelIfc bugs).
          # '.' = bsv/ working dir, where peakrdl-generated *_Reg_csr.bsv packages live.
          export BSC_PATH=.:/bsv_axi/src/axi4:/bsv_axi/src/apb:/bsv_axi/src/common:+
          out=$(MAKEFLAGS= make -C "$IP_DIR" rtl 2>&1 </dev/null)
          [ $? -eq 0 ] && pass "2_peakrdl" || fail "2_peakrdl" "$out"

          # ---- 3. bsc: compile a minimal self-contained BSV module -----
          mkdir -p /tmp/bsc_bo
          cat > /tmp/bsc_test.bsv << 'BSV'
          module sysHello(Empty);
            rule r; $display("BSC OK"); $finish; endrule
          endmodule
          BSV
          out=$(bsc -sim -bdir /tmp/bsc_bo -u /tmp/bsc_test.bsv 2>&1 </dev/null)
          [ $? -eq 0 ] && pass "3_bsc" || fail "3_bsc" "$out"

          # The BSC top module is mkMyip.v (mk + capitalize(ip_name)).
          # Exclude BRAM*.v: BSC library BRAMs use $fopen/sim pragmas yosys 0.33 can't parse.
          top_v="$IP_DIR/verilog/mkMyip.v"
          top_mod=mkMyip
          v_files=$(ls "$IP_DIR"/verilog/*.v 2>/dev/null | grep -v 'BRAM' | tr '\n' ' ')

          # ---- 4. verilator: lint the top-level BSC-compiled Verilog ---
          if [ -z "$top_v" ]; then
            fail "4_verilator" "no mk*.v found - peakrdl/bsc step may have failed"
          else
            out=$(verilator --lint-only \
              -y "$IP_DIR/verilog" \
              -Wno-UNUSED -Wno-UNDRIVEN -Wno-PINCONNECTEMPTY -Wno-DECLFILENAME \
              -Wno-WIDTH -Wno-CASEINCOMPLETE -Wno-CASEOVERLAP \
              -Wno-INITIALDLY -Wno-STMTDLY -Wno-BLKSEQ -Wno-COMBDLY \
              -Wno-MULTIDRIVEN \
              "$top_v" 2>&1 </dev/null)
            [ $? -eq 0 ] && pass "4_verilator" || fail "4_verilator" "$out"
          fi

          # ---- 5. verible: lint the top-level BSC-compiled Verilog -----
          if [ -z "$top_v" ]; then
            fail "5_verible" "no mk*.v found - peakrdl/bsc step may have failed"
          else
            out=$(verible-verilog-lint \
              --rules="-no-trailing-spaces,-no-tabs,-explicit-parameter-storage-type,-struct-union-name-style,-parameter-name-style,-typedef-structs-unions" \
              "$top_v" 2>&1 </dev/null)
            [ $? -eq 0 ] && pass "5_verible" || fail "5_verible" "$out"
          fi

          # ---- 6. yosys: synthesise the BSC-compiled CSR Verilog -------
          if [ -z "$top_v" ]; then
            fail "6_yosys" "no mk*.v found - peakrdl/bsc step may have failed"
          else
            mkdir -p /tmp/yosys_out
            out=$(yosys -p "read_verilog $v_files; synth -top $top_mod; write_verilog /tmp/yosys_out/synth.v" 2>&1 </dev/null)
            [ $? -eq 0 ] && pass "6_yosys" || fail "6_yosys" "$out"
          fi

          # ---- 7. formal/Makefile: sby-prove via generated Makefile ----
          if [ -z "$v_files" ]; then
            fail "7_sby" "no verilog files found - peakrdl/bsc step may have failed"
          else
            out=$(make -C "$IP_DIR/formal" sby-prove 2>&1 </dev/null)
            [ $? -eq 0 ] && pass "7_sby" || fail "7_sby" "$out"
          fi

          # ---- 8. tb/Makefile: cocotb RAL test (APB + AXI4 + peakrdl-cocotb-ralgen)
          if [ -z "$v_files" ]; then
            fail "8_tb_ral" "no verilog files found - peakrdl/bsc step may have failed"
          else
            out=$(make -C "$IP_DIR/tb" 2>&1 </dev/null)
            [ $? -eq 0 ] && pass "8_tb_ral" || fail "8_tb_ral" "$out"
          fi

          # ---- 9. lint/Makefile: verilator lint via generated Makefile -
          if [ -z "$top_v" ]; then
            fail "9_lint" "no mk*.v found - BSC step may have failed"
          else
            out=$(make -C "$IP_DIR/lint" verilator 2>&1 </dev/null)
            [ $? -eq 0 ] && pass "9_lint" || fail "9_lint" "$out"
          fi

          # ---- 10. synth/Makefile: yosys synthesis via generated Makefile
          if [ -z "$top_v" ]; then
            fail "10_synth" "no mk*.v found - BSC step may have failed"
          else
            out=$(make -C "$IP_DIR/synth" synth_yosys 2>&1 </dev/null)
            [ $? -eq 0 ] && pass "10_synth" || fail "10_synth" "$out"
          fi

          # ---- 11. cdc/Makefile: yosys CDC check via generated Makefile
          if [ -z "$top_v" ]; then
            fail "11_cdc" "no mk*.v found - BSC step may have failed"
          else
            out=$(make -C "$IP_DIR/cdc" yosys_cdc 2>&1 </dev/null)
            [ $? -eq 0 ] && pass "11_cdc" || fail "11_cdc" "$out"
          fi

          # ---- 12. systemrdl/Makefile: peakrdl markdown doc generation -
          out=$(make -C "$IP_DIR/systemrdl" doc 2>&1 </dev/null)
          [ $? -eq 0 ] && pass "12_systemrdl" || fail "12_systemrdl" "$out"

          # ---- 13. constraints: sdc file with correct clock constraint
          if grep -q 'create_clock' "$IP_DIR/constraints/myip.sdc" 2>/dev/null; then
            pass "13_constraints"
          else
            fail "13_constraints" "constraints/myip.sdc missing or lacks create_clock"
          fi

          # ---- 14. ci: ci/Makefile orchestration — delegates lint via MYIP_ROOT
          if [ -f "$IP_DIR/ci/Makefile" ]; then
            out=$(make -C "$IP_DIR/ci" lint 2>&1 </dev/null)
            [ $? -eq 0 ] && pass "14_ci" || fail "14_ci" "$out"
          else
            fail "14_ci" "ci/Makefile not generated"
          fi

          # ---- 15. pnr: LibreLane RTL-to-GDS flow (sky130A) ------------
          if [ -z "$v_files" ]; then
            fail "15_pnr" "no verilog files found - BSC step may have failed"
          else
            out=$(make -C "$IP_DIR/pnr" pnr PDK_ROOT=/opt/pdk 2>&1 </dev/null)
            [ $? -eq 0 ] && pass "15_pnr" || fail "15_pnr" "$out"
          fi

          # ---- 16. drc: Magic DRC on LibreLane GDS output --------------
          if [ ! -f "$IP_DIR/drc/Makefile" ] || [ ! -f "$IP_DIR/drc/magic_drc.tcl" ]; then
            fail "16_drc" "drc/ template files missing"
          elif [ -z "$(find "$IP_DIR/pnr/runs" -name 'mkMyip.gds' -path '*/final/gds/*' 2>/dev/null | head -1)" ]; then
            fail "16_drc" "no GDS found under pnr/runs/ - pnr step may have failed"
          else
            out=$(make -C "$IP_DIR/drc" drc PDK_ROOT=/opt/pdk 2>&1 </dev/null)
            [ $? -eq 0 ] && pass "16_drc" || fail "16_drc" "$out"
          fi

          # ---- 17. sta: OpenSTA timing analysis on synthesized netlist -
          if [ ! -f "$IP_DIR/sta/Makefile" ] || [ ! -f "$IP_DIR/sta/run_sta.tcl" ]; then
            fail "17_sta" "sta/ template files missing"
          elif [ ! -f "$IP_DIR/synth/output/mkMyip_synth.v" ]; then
            fail "17_sta" "synth/output/mkMyip_synth.v missing - run synth first"
          else
            out=$(make -C "$IP_DIR/sta" sta PDK_ROOT=/opt/pdk 2>&1 </dev/null)
            [ $? -eq 0 ] && pass "17_sta" || fail "17_sta" "$out"
          fi

          # ---- 18. power: OpenSTA power analysis (LibreLane netlist + cocotb VCD)
          if [ ! -f "$IP_DIR/power/Makefile" ] || [ ! -f "$IP_DIR/power/run_power.tcl" ]; then
            fail "18_power" "power/ template files missing"
          elif [ -z "$(find "$IP_DIR/pnr/runs" -name 'mkMyip.nl.v' -path '*/final/nl/*' 2>/dev/null | head -1)" ]; then
            fail "18_power" "no gate-level netlist found under pnr/runs/ - pnr step may have failed"
          elif [ -z "$(find "$IP_DIR/tb" -name '*.vcd' 2>/dev/null | head -1)" ]; then
            fail "18_power" "no VCD found under tb/ - tb simulation step may have failed"
          else
            out=$(make -C "$IP_DIR/power" power PDK_ROOT=/opt/pdk 2>&1 </dev/null)
            [ $? -eq 0 ] && pass "18_power" || fail "18_power" "$out"
          fi

          # ---- 19. doc: pandoc HTML generation --------------------------
          # Disabled: the rtl_unit_tools image has no ~/.pandoc assets and
          # doc's testplan.md input is only produced by the top-level
          # `make testplan`. Re-enable together with the 19_doc entry in
          # BASE_TESTS once the image supports doc generation.
          # out=$(make -C "$IP_DIR/doc" doc 2>&1 </dev/null)
          # [ $? -eq 0 ] && pass "19_doc" || fail "19_doc" "$out"

          # ---- 20. fpga: template files generated (Vivado) -------------
          if [ -f "$IP_DIR/fpga/Makefile" ] && [ -f "$IP_DIR/fpga/vivado_flow.tcl" ]; then
            pass "20_fpga"
          else
            fail "20_fpga" "fpga/ template files missing"
          fi

          # ---- 21. systemC: README generated ----------------------------
          if [ -f "$IP_DIR/systemC/README.md" ]; then
            pass "21_systemC"
          else
            fail "21_systemC" "systemC/README.md not generated"
          fi

          CONTAINER_EOF
          docker_exit=$?

          echo "==> DIAG: docker run exit code: $docker_exit"
          docker inspect -f 'DIAG: OOMKilled={{.State.OOMKilled}} ExitCode={{.State.ExitCode}} Error={{.State.Error}}' "ci_test_run_${COMBO}" 2>&1 || true
          docker rm -f "ci_test_run_${COMBO}" > /dev/null 2>&1 || true

          # -------------------------------------------------------------
          # Report (host side — reads $RESULTS_DIR, bind-mounted above)
          # -------------------------------------------------------------
          RED='\033[0;31m'; GREEN='\033[0;32m'; YELLOW='\033[1;33m'
          BOLD='\033[1m'; NC='\033[0m'

          echo -e "\n${BOLD}=== Test Report [$COMBO] ===${NC}\n"

          BASE_TESTS=(
            "1_copier:copier           template generation"
            "2_peakrdl:peakrdl+bsc      CSR BSV → Verilog"
            "3_bsc:bsc               BSV compiler smoke test"
            "4_verilator:verilator       BSC Verilog lint"
            "5_verible:verible          BSC Verilog lint"
            "6_yosys:yosys             CSR Verilog synthesis"
            "7_sby:formal/Makefile    sby-prove"
            "8_tb_ral:tb/Makefile       cocotb RAL (APB + AXI4 + ralgen)"
            "9_lint:lint/Makefile     verilator lint"
            "10_synth:synth/Makefile  yosys synthesis"
            "11_cdc:cdc/Makefile      yosys CDC check"
            "12_systemrdl:systemrdl/Make  peakrdl markdown"
            "13_constraints:constraints    sdc clock constraint"
            "14_ci:ci/Makefile        lint via ci orchestration"
            "15_pnr:pnr/              LibreLane RTL-to-GDS (sky130A)"
            "16_drc:drc/              Magic DRC on LibreLane GDS"
            "17_sta:sta/              OpenSTA timing analysis"
            "18_power:power/            OpenSTA power (LibreLane netlist + VCD)"
            # 19_doc disabled — no pandoc assets in tools image (see step 19 above)
            "20_fpga:fpga/             vivado_flow.tcl generated"
            "21_systemC:systemC/          README generated"
          )

          pass_count=0
          fail_count=0

          for entry in "${BASE_TESTS[@]}"; do
            key="${entry%%:*}"
            label="${entry#*:}"
            sf="$RESULTS_DIR/${key}.status"
            df="$RESULTS_DIR/${key}.detail"

            if [ ! -f "$sf" ]; then
              echo -e "  ${RED}[FAIL]${NC}  $label  (no result recorded)"
              fail_count=$((fail_count + 1))
              continue
            fi

            if [ "$(cat "$sf")" = "PASS" ]; then
              echo -e "  ${GREEN}[PASS]${NC}  $label"
              pass_count=$((pass_count + 1))
            else
              echo -e "  ${RED}[FAIL]${NC}  $label"
              if [ -s "$df" ]; then
                while IFS= read -r line; do
                  echo -e "         ${YELLOW}| $line${NC}"
                done < "$df"
              fi
              fail_count=$((fail_count + 1))
            fi
          done

          echo
          total=$((pass_count + fail_count))

          # Per-combo compact summary; the report job aggregates all 4.
          SUMMARY="$GITHUB_WORKSPACE/test_summary.txt"
          {
            echo "combo=$COMBO run=$(date -Iseconds) pass=$pass_count fail=$fail_count total=$total"
            for entry in "${BASE_TESTS[@]}"; do
              key="${entry%%:*}"; label="${entry#*:}"
              sf="$RESULTS_DIR/${key}.status"; df="$RESULTS_DIR/${key}.detail"
              status=$(cat "$sf" 2>/dev/null || echo MISSING)
              if [ "$status" != "PASS" ]; then
                echo "FAIL $key | $label"
                [ -s "$df" ] && sed 's/^/  /' "$df"
              fi
            done
            [ "$fail_count" -eq 0 ] && echo "ALL_PASSED"
          } > "$SUMMARY"

          if [ $fail_count -eq 0 ]; then
            echo -e "  ${GREEN}${BOLD}All $total/$total tests passed.${NC}"
            exit 0
          else
            echo -e "  ${RED}${BOLD}$fail_count/$total tests failed.${NC}"
            exit 1
          fi
          } 2>&1 | tee "$GITHUB_WORKSPACE/err.log"
          exit "${PIPESTATUS[0]}"

      - name: Show compact test summary [${{ matrix.combo }}]
        if: always()
        run: |
          if [ -f test_summary.txt ]; then
            cat test_summary.txt
            # Also publish to the run's Summary tab
            {
              echo "## [${{ matrix.combo }}] test summary"
              echo '```'
              cat test_summary.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "(no summary written)"
          fi

      # Uploaded unconditionally (small) so the report job can aggregate
      # across all 4 parallel combos into one combined view.
      - name: Upload per-combo summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: summary-${{ matrix.combo }}
          path: test_summary.txt
          if-no-files-found: ignore

      - name: Upload artifacts on failure [${{ matrix.combo }}]
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: hdl_unit-test-artifacts-${{ matrix.combo }}
          path: |
            err.log
            test_summary.txt
            myip/tb/results.xml
            myip/tb/*.vcd
            myip/verilog/
            myip/synth/output/
            myip/pnr/runs/
          if-no-files-found: ignore

  # Aggregates the 4 parallel matrix jobs' summaries into one view. Purely
  # informational — the required-check gate is the `test` matrix itself
  # (any red combo already fails the workflow); this job never fails.
  report:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all per-combo summaries
        uses: actions/download-artifact@v8
        with:
          pattern: summary-*
          path: summaries
          merge-multiple: false

      - name: Combine into one report
        run: |
          {
            echo "## hdl_unit template CI — combined summary (4 parallel combos)"
            echo '```'
            for f in summaries/*/test_summary.txt; do
              [ -f "$f" ] && cat "$f" && echo
            done
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          cat summaries/*/test_summary.txt 2>/dev/null || echo "(no summaries found)"
